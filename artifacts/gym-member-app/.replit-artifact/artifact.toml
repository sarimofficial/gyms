kind = "mobile"
previewPath = "/"
title = "Gym Member App"
version = "1.0.0"
id = "artifacts/gym-member-app"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 21519

[services.development]
run = "pnpm --filter @workspace/gym-member-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gym-member-app", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/gym-member-app", "run", "serve" ]

[services.env]
PORT = "21519"
BASE_PATH = "/"
